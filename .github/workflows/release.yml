name: Release APK

# Push a tag like v4.0 to build a signed APK and attach it to a GitHub Release.
# A manual run (workflow_dispatch) builds the signed APK and uploads it as an artifact.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64    base64 of keystore/vmpro-release.jks
#   KEYSTORE_PASSWORD  the keystore password
#   KEY_ALIAS          vmpro
#   KEY_PASSWORD       the key password (same as keystore password here)
#   APTABASE_KEY       your Aptabase app key (optional; blank disables analytics)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish signed APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/vmpro-release.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=keystore/vmpro-release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Inject Aptabase key
        env:
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
        run: echo "aptabase.key=$APTABASE_KEY" >> local.properties

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMPro-release-apk
          path: app/build/outputs/apk/release/vmpro-*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/vmpro-*.apk
          generate_release_notes: true
